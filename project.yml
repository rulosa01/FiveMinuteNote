name: FiveMinuteNote
options:
  bundleIdPrefix: com.fiveminutenote
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
targets:
  FiveMinuteNote:
    type: application
    platform: macOS
    sources:
      - path: FiveMinuteNote
        excludes:
          - FiveMinuteNote.entitlements
    info:
      path: FiveMinuteNote/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Five Minute Note
        CFBundleDisplayName: Five Minute Note
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    entitlements:
      path: FiveMinuteNote/FiveMinuteNote.entitlements
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.fiveminutenote.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        ENABLE_APP_SANDBOX: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
