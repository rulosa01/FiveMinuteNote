name: FiveMinuteNote
options:
  bundleIdPrefix: com.fiveminutenote
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
targets:
  FiveMinuteNote:
    type: application
    platform: macOS
    sources:
      - path: FiveMinuteNote
        excludes:
          - FiveMinuteNote.entitlements
    info:
      path: FiveMinuteNote/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Five Minute Note
        CFBundleDisplayName: Five Minute Note
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    entitlements:
      path: FiveMinuteNote/FiveMinuteNote.entitlements
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.fiveminutenote.app
        PRODUCT_NAME: "Five Minute Note"
        PRODUCT_MODULE_NAME: FiveMinuteNote
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        ENABLE_APP_SANDBOX: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
  FiveMinuteNoteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FiveMinuteNoteTests
    dependencies:
      - target: FiveMinuteNote
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Five Minute Note.app/Contents/MacOS/Five Minute Note"
